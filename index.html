input,select,button,textarea{font-family:inherit;font-size:inherit}

// ══════════════════════════════════════

// ══════════════════════════════════════
const uid=()=>crypto.randomUUID?.() || Date.now()+'-'+Math.random().toString(36).slice(2,9);
const $=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const $$=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n);
const fd=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch{return d;}};
const iso=()=>new Date().toISOString().slice(0,10);
function daysUntil(s){const a=new Date(s+'T12:00:00'),b=new Date();a.setHours(0,0,0,0);b.setHours(0,0,0,0);return Math.round((a-b)/864e5);}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);}

const INIT={income:[],expenses:[],envelopes:CATS.map(c=>({categoryId:c.id,budgeted:0})),setupDone:false};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let S={auth:null,data:{...INIT},tab:'home',modal:null,toast:null,syncing:false,_tf:null,_bf:'all'};

function setState(p){Object.assign(S,typeof p==='function'?p(S):p);render();}
function flash(m){clearTimeout(S._tf);S.toast=m;S._tf=setTimeout(()=>{S.toast=null;render();},1800);render();}

function updateData(fn){S.data=fn(S.data);render();debouncedSave();}

// ══════════════════════════════════════
// SUPABASE SYNC
// ══════════════════════════════════════
let _st;
async function cloudSave(){
  if(!sb||!S.auth?.user)return;S.syncing=true;render();
  try{await sb.from('budget_data').upsert({user_id:S.auth.user.id,data:S.data},{onConflict:'user_id'});}catch(e){console.error(e);}
  S.syncing=false;render();
}
function debouncedSave(){clearTimeout(_st);_st=setTimeout(cloudSave,800);}

async function cloudLoad(){
  if(!sb||!S.auth?.user)return;
  try{const{data}=await sb.from('budget_data').select('data').eq('user_id',S.auth.user.id).maybeSingle();
    if(data?.data)S.data={...INIT,...data.data};}catch(e){console.error(e);}
  render();
}

async function checkAuth(){
  if(!sb){S.auth='login';render();return;}
  try{const{data:{session}}=await sb.auth.getSession();
    if(session?.user){S.auth={user:session.user};await cloudLoad();}else S.auth='login';
  }catch(e){console.error(e);S.auth='login';}
  render();
}
if(sb)sb.auth.onAuthStateChange(async(ev,sess)=>{
  if(sess?.user){S.auth={user:sess.user};await cloudLoad();render();}
  else if(ev==='SIGNED_OUT'){S.auth='login';S.data={...INIT};render();}
});

// ══════════════════════════════════════
// DOM HELPERS
// ══════════════════════════════════════
const app=document.getElementById('app');
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;else if(k==='innerHTML')el.innerHTML=v;
    else if(k==='checked')el.checked=v;else if(k==='value')el.value=v;
    else if(k==='disabled'){if(v)el.setAttribute('disabled','');}
    else if(k==='type')el.setAttribute('type',v);else if(k==='placeholder')el.setAttribute('placeholder',v);
    else if(k==='inputMode')el.setAttribute('inputmode',v);
    else if(k==='autoFocus')setTimeout(()=>el.focus(),50);
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);});
  return el;
}

// ══════════════════════════════════════
// COMPUTATIONS
// ══════════════════════════════════════
function totals(){
  const inc=S.data.income.reduce((s,i)=>s+ +i.amount,0);
  const exp=S.data.expenses.reduce((s,e)=>s+ +e.amount,0);
  const paid=S.data.expenses.filter(e=>e.paid).reduce((s,e)=>s+ +e.amount,0);
  return{inc,exp,paid,remaining:inc-exp};
}

function payPeriods(){
  // Get all paychecks sorted by date
  const checks=S.data.income.filter(i=>i.nextPayDate&&i.amount>0).sort((a,b)=>a.nextPayDate.localeCompare(b.nextPayDate));
  if(!checks.length)return[];

  // Generate next ~3 months of pay dates per source
  let allPays=[];
  checks.forEach(src=>{
    let d=src.nextPayDate;
    const interval=src.cadence==='Weekly'?7:src.cadence==='Biweekly'?14:src.cadence==='Semi-monthly'?15:30;
    for(let i=0;i<6;i++){
      allPays.push({date:d,name:src.name,amount:+src.amount});
      d=addDays(d,interval);
    }
  });
  allPays.sort((a,b)=>a.date.localeCompare(b.date));

  // Build periods: [payDate, nextPayDate)
  const periods=[];
  for(let i=0;i<allPays.length;i++){
    const start=allPays[i].date;
    const end=allPays[i+1]?allPays[i+1].date:addDays(start,14);
    const bills=S.data.expenses.filter(e=>e.dueDate&&e.dueDate>=start&&e.dueDate<end&&!e.paid);
    const totalBills=bills.reduce((s,e)=>s+ +e.amount,0);
    periods.push({
      source:allPays[i].name,
      income:allPays[i].amount,
      start,end,bills,totalBills,
      leftover:allPays[i].amount-totalBills
    });
  }
  return periods;
}

    card.appendChild(top);
    const row=h('div',{className:'form-row'});
    const d1=h('div');d1.appendChild(h('input',{className:'form-input',type:'number',inputMode:'decimal',placeholder:'$ Amount',id:'exp-amt-'+i,style:{fontSize:'14px',padding:'10px 12px'}}));
    row.appendChild(d1);
    const d2=h('div');d2.appendChild(h('input',{className:'form-input',type:'date',id:'exp-date-'+i,style:{fontSize:'14px',padding:'10px 12px'}}));
    row.appendChild(d2);
    card.appendChild(row);
    page.appendChild(card);
  });

function renderBills(){
  const filter=S._bf||'all';
  const items=S.data.expenses;
  const list=(filter==='all'?items:filter==='unpaid'?items.filter(e=>!e.paid):items.filter(e=>e.paid))
    .sort((a,b)=>{if(a.paid!==b.paid)return a.paid?1:-1;return(a.dueDate||'').localeCompare(b.dueDate||'');});

  const page=h('div',{className:'page'});
  const hdr=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}});
  hdr.appendChild(h('h1',{className:'h1'},'Bills & Expenses'));
  hdr.appendChild(h('button',{className:'btn-pri',onClick:()=>setState({modal:'exp'})},'+ Add'));
  page.appendChild(hdr);

  // Filters
  const pills=h('div',{style:{display:'flex',gap:'8px',marginBottom:'16px'}});
  ['all','unpaid','paid'].forEach(k=>{
    const cnt=k==='all'?items.length:k==='unpaid'?items.filter(e=>!e.paid).length:items.filter(e=>e.paid).length;
    pills.appendChild(h('button',{className:'chip'+(filter===k?' active':''),onClick:()=>{S._bf=k;render();}},
      k[0].toUpperCase()+k.slice(1)+' ('+cnt+')'));
  });

  // Copy due dates
  const unpaidWithDates=items.filter(e=>!e.paid&&e.dueDate);

    page.appendChild(h('button',{className:'btn-link',style:{marginBottom:'12px',fontSize:'13px'},onClick:copyDue},'📋 Copy due dates for OpenClaw'));
  }

  if(!list.length){
    page.appendChild(h('div',{className:'card',style:{color:'var(--text3)',textAlign:'center',fontSize:'14px'}},'No expenses here'));
  }else{
    list.forEach(e=>{
      const c=catFor(e.categoryId);const d=e.dueDate?daysUntil(e.dueDate):null;
      const row=h('div',{className:'row',style:{opacity:e.paid?.5:1,flexWrap:'wrap',gap:'8px'}});
      // Checkbox
      row.appendChild(h('button',{className:'chk'+(e.paid?' done':''),innerHTML:e.paid?svgChk:'',
        onClick:()=>{updateData(dd=>({...dd,expenses:dd.expenses.map(x=>x.id===e.id?{...x,paid:!x.paid}:x)}));}}));
      // Icon
      row.appendChild(h('div',{className:'ico',style:{background:c.color+'18',fontSize:'16px',marginLeft:'6px'}},c.icon));
      // Info
      row.appendChild(h('div',{style:{flex:1,marginLeft:'8px',minWidth:'120px'}},
        h('div',{style:{fontSize:'15px',fontWeight:600,textDecoration:e.paid?'line-through':'none'}},e.name),
        h('div',{style:{fontSize:'12px',color:d!==null&&d<=2&&!e.paid?'var(--red)':'var(--text3)'}},
          c.name+(e.dueDate?' · '+fd(e.dueDate):'')+(d!==null&&!e.paid?(d<0?' · Overdue':d===0?' · Today':' · '+d+'d'):''))
      ));
      // Amount (editable)
      row.appendChild(h('input',{className:'edit-inline',type:'number',inputMode:'decimal',value:e.amount||'',placeholder:'$0',
        onClick:ev=>ev.stopPropagation(),
        onChange:ev=>{updateData(dd=>({...dd,expenses:dd.expenses.map(x=>x.id===e.id?{...x,amount:+ev.target.value||0}:x)}));}}));
      // Date (editable)
      row.appendChild(h('input',{className:'edit-date',type:'date',value:e.dueDate||'',
        onClick:ev=>ev.stopPropagation(),
        onChange:ev=>{updateData(dd=>({...dd,expenses:dd.expenses.map(x=>x.id===e.id?{...x,dueDate:ev.target.value}:x)}));}}));
      // Delete
      row.appendChild(h('button',{className:'btn-x',innerHTML:svgX,onClick:()=>{updateData(dd=>({...dd,expenses:dd.expenses.filter(x=>x.id!==e.id)}));flash('Deleted');}}));
      page.appendChild(row);
    });
  }
  return page;
}

    btm.appendChild(h('input',{className:'env-input',type:'number',inputMode:'numeric',value:env.budgeted||'',placeholder:'0',

    card.appendChild(btm);

// AUTH
// ══════════════════════════════════════
function renderAuth(){
  let email='',password='',loading=false,error='';
  function draw(){
    app.innerHTML='';
    app.appendChild(h('div',{className:'auth-wrap'},h('div',{className:'auth-card'},
      h('div',{style:{fontSize:'40px',marginBottom:'12px'}},'💰'),
      h('h1',{style:{fontSize:'24px',fontWeight:800,marginBottom:'4px'}},'MoneyBuckets'),
      h('p',{style:{color:'#8E8E93',fontSize:'14px',marginBottom:'24px'}},'Sign in to sync across devices'),
      h('label',{className:'form-label',style:{textAlign:'left',marginTop:0}},'Email'),
      h('input',{className:'form-input',type:'email',placeholder:'you@example.com',value:email,onInput:e=>{email=e.target.value},autoFocus:true}),
      h('label',{className:'form-label',style:{textAlign:'left'}},'Password'),
      h('input',{className:'form-input',type:'password',placeholder:'••••••••',value:password,onInput:e=>{password=e.target.value},
        onKeydown:e=>{if(e.key==='Enter'&&email.trim()&&password)go();}}),
      error?h('p',{style:{color:'var(--red)',fontSize:'13px',marginTop:'8px'}},error):null,
      h('button',{className:'btn-pri-lg',style:{marginTop:'16px',opacity:loading?.6:1},disabled:loading,onClick:go},loading?'Signing in...':'Sign In')
    )));
  }
  async function go(){
    if(!email.trim()||!email.includes('@')){error='Enter a valid email';draw();return;}
    if(!password||password.length<6){error='Password must be at least 6 characters';draw();return;}
    loading=true;error='';draw();
    const{error:err}=await sb.auth.signInWithPassword({email:email.trim(),password});
    loading=false;if(err){error=err.message;draw();}
  }
  draw();
}

function renderModal(){

  const f={};

  const overlay=h('div',{className:'overlay',onClick:()=>setState({modal:null})});
  const modal=h('div',{className:'modal',onClick:e=>e.stopPropagation()});

  if(!isInc){

  modal.appendChild(h('label',{className:'form-label'},isInc?'Next Pay Date':'Due Date'));

  if(isInc){
    modal.appendChild(h('label',{className:'form-label'},'Cadence'));
    const sel=h('select',{className:'form-input',onInput:e=>{f.cadence=e.target.value}});
    ['Weekly','Biweekly','Semi-monthly','Monthly','One-time'].forEach(c=>sel.appendChild(h('option',null,c)));
    f.cadence='Biweekly';modal.appendChild(sel);
  }else{
    const lbl=h('label',{style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'14px',fontSize:'14px',color:'var(--text2)',fontWeight:500}});
    const cb=h('input',{type:'checkbox',style:{width:'20px',height:'20px',accentColor:'var(--blue)'},onChange:e=>{f.recurring=e.target.checked}});
    lbl.appendChild(cb);lbl.appendChild(document.createTextNode('Recurring monthly'));modal.appendChild(lbl);
  }

  const btns=h('div',{style:{display:'flex',gap:'10px',marginTop:'20px'}});
  btns.appendChild(h('button',{className:'btn-sec-lg',onClick:()=>setState({modal:null})},'Cancel'));
  btns.appendChild(h('button',{className:'btn-pri-lg',style:{flex:2},onClick:()=>{
    const name=(f.name||'').trim();const amount=+f.amount;if(!name||!amount)return;
    if(isInc){updateData(d=>({...d,income:[...d.income,{id:uid(),name,amount,cadence:f.cadence||'Biweekly',nextPayDate:f.date}]}));}
    else{updateData(d=>({...d,expenses:[...d.expenses,{id:uid(),name,amount,categoryId:f.categoryId||CATS[0].id,dueDate:f.date,recurring:!!f.recurring,paid:false}]}));}
    flash((isInc?'Income':'Expense')+' added');setState({modal:null});
  }},isInc?'Add Income':'Add Expense'));
  modal.appendChild(btns);
  overlay.appendChild(modal);return overlay;
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function copyDue(){
  const lines=S.data.expenses.filter(e=>!e.paid&&e.dueDate).sort((a,b)=>a.dueDate.localeCompare(b.dueDate))
    .map(e=>fd(e.dueDate)+' — '+e.name+': '+$$(e.amount));
  navigator.clipboard?.writeText('📅 Due Dates\n\n'+(lines.length?lines.join('\n'):'All clear!'));flash('Copied for OpenClaw');
}
function exportJSON(){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'}));
  a.download='moneybuckets-'+iso()+'.json';a.click();flash('Exported');
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{updateData(()=>({...INIT,...JSON.parse(ev.target.result)}));flash('Imported');}catch{flash('Invalid file');}};
    r.readAsText(f);};inp.click();
}

// ══════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════
function render(){
  if(S.auth===null){app.innerHTML='<div class="auth-wrap"><div class="spinner"></div></div>';return;}
  if(S.auth==='login'){renderAuth();return;}
  if(!S.data.setupDone){renderSetup();return;}

  app.innerHTML='';
  const body=h('div',{className:'body'});
  switch(S.tab){
    case'home':body.appendChild(renderHome());break;
    case'paycheck':body.appendChild(renderIncome());break;
    case'bills':body.appendChild(renderBills());break;
    case'budget':body.appendChild(renderBudget());break;
    case'more':body.appendChild(renderMore());break;
  }
  app.appendChild(body);

  const nav=h('nav',{className:'nav'});
  ['home','paycheck','bills','budget','more'].forEach(id=>{
    const label={home:'Home',paycheck:'Income',bills:'Bills',budget:'Budget',more:'More'}[id];
    const btn=h('button',{className:S.tab===id?'active':'',onClick:()=>setState({tab:id})});
    btn.innerHTML=NAV[id];btn.appendChild(h('span',null,label));nav.appendChild(btn);
  });
  app.appendChild(nav);

  const modal=renderModal();if(modal)app.appendChild(modal);
  if(S.toast)app.appendChild(h('div',{className:'toast'},S.toast));
}

checkAuth();
</script>
</body>
</html>
