/*
DATA SHAPE:
{
bills: [{id, name, cat, defaultAmt, dueDay, graceDays, recurring:true}],

const INIT={bills:[],income:[],months:{},setupDone:false};

function getMonth(data,key){
if(!key)key=ym();
if(!data.months[key])data.months[key]={overrides:{},assigned:{},paid:{}};
return data.months[key];
}
function billAmt(data,bill,monthKey){
const m=data.months[monthKey||ym()];
if(m?.overrides?.[bill.id]!==undefined)return m.overrides[bill.id];

// ═══ PAYDAY SPLIT (Home) ═══
function renderSplit(){
const mk=ym();
const mo=getMonth(D.data,mk);
const bills=D.data.bills.filter(b=>b.recurring!==false);

// Sort: unpaid+unassigned first, then assigned, then paid. Within each: by due day
const sorted=[…bills].sort((a,b)=>{
const ap=mo.paid?.[a.id],bp=mo.paid?.[b.id];
const aa=mo.assigned?.[a.id],ba=mo.assigned?.[b.id];
if(ap!==bp)return ap?1:-1;
